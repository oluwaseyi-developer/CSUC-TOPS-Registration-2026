name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/CSUC.Registration.*/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore src/CSUC.Registration.Api/CSUC.Registration.Api.csproj

    - name: Build
      run: dotnet build src/CSUC.Registration.Api/CSUC.Registration.Api.csproj --configuration Release --no-restore

    - name: Test
      run: dotnet test --no-restore --verbosity normal || true

    - name: Publish
      run: dotnet publish src/CSUC.Registration.Api/CSUC.Registration.Api.csproj --configuration Release --output ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-publish
        path: ./publish

